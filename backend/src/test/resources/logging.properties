# Suppress the "Unable to find CDP implementation" warnings that appear when
# the installed Chrome version is newer than the CDP artifacts bundled with
# the current selenium-java release. These warnings are harmless — WebDriver
# functionality (click, type, navigate) works without CDP.
org.openqa.selenium.devtools.CdpVersionFinder.level = SEVERE
org.openqa.selenium.chromium.ChromiumDriver.level = SEVERE
